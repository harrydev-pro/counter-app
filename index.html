<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>skipper counnter app</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="wrapper">
        <h1>skipper counter app</h1>
        <h2 id="counter">0</h2>
        <section class="btn">
            <button type="button" id="lowercount">decrement</button>
            <button type="button" id="reset"> reset</button>
            <button type="button" id="addcount">increment</button>
        </section>
        <section class="initial-wrapper">

            <input type="number" id="init">
            <button type="button" id="initial"> set initial count</button>
        </section>
      


    </main>
    <script src="main.js"></script>
</body>

</html>
